function calcDday(d){if(!d)return null;const x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-today)/86400000);}
function todayStr(){return today.toISOString().slice(0,10);}

const RS=["주문전","주문완료","배송중","도착","재주문필요"];
const RC={"주문전":"#64748b","주문완료":"#818cf8","배송중":"#fbbf24","도착":"#34d399","재주문필요":"#f87171"};
const T={bg:"#0a0f1e",panel:"#111827",card:"#1a2235",card2:"#1e2a3d",border:"#1e2d45",text:"#e2e8f0",text2:"#94a3b8",text3:"#475569",accent:"#818cf8",aD:"#818cf822"};

    {id:2,projectId:1,cat:"work",title:"실험 데이터 그래프 재작성",priority:"important",ddate:"2026-06-05",starred:false,briefing:false,done:false,archived:false},
    {id:3,projectId:2,cat:"work",title:"나노센서 실험 데이터 정리",priority:"urgent",ddate:"2026-05-30",starred:true,briefing:true,done:false,archived:false},
    {id:4,projectId:3,cat:"work",title:"IRC 미팅 자료 준비",priority:"urgent",ddate:"2026-05-30",starred:true,briefing:true,done:false,archived:false},
    {id:5,projectId:3,cat:"work",title:"중간 보고서 초안 작성",priority:"important",ddate:"2026-06-08",starred:false,briefing:false,done:false,archived:false},
    {id:6,projectId:4,cat:"work",title:"PD 실험 계획서 작성",priority:"normal",ddate:"2026-06-12",starred:false,briefing:false,done:false,archived:false},

function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):INIT;}catch{return INIT;}}
function loadSS(){try{return JSON.parse(localStorage.getItem("myday_sync")||"{}");}catch{return {};}}

function buildBriefing(data){
  const now=new Date();
  const dn=["일","월","화","수","목","금","토"];
  const dl=`${now.getMonth()+1}월 ${now.getDate()}일 (${dn[now.getDay()]})`;
  const h=now.getHours();
  const gr=h<12?"좋은 아침이에요 ☀️":h<18?"안녕하세요 🌤️":"수고 많으셨어요 🌙";
  const at=(data.tasks||[]).filter(t=>!t.done&&!t.archived);
  const bt=(data.tasks||[]).filter(t=>t.briefing&&!t.done&&!t.archived);
  const ut=at.filter(t=>t.priority==="urgent");
  const af=[...new Map([...bt,...ut].map(t=>[t.id,t])).values()];
  if(!at.length)return`📅 ${dl}\n${gr}\n\n모든 할일을 완료했어요! 🎉`;
  let L=[`📅 ${dl}  ${gr}`,"─────────────────"];
  const top=[...af].sort((a,b)=>{const po={urgent:0,important:1,normal:2};if(po[a.priority]!==po[b.priority])return po[a.priority]-po[b.priority];const da=calcDday(a.ddate),db=calcDday(b.ddate);if(da!==null&&db!==null)return da-db;if(da!==null)return-1;if(db!==null)return 1;return 0;})[0];
  if(top){const p=(data.projects||[]).find(x=>x.id===top.projectId);const dd=calcDday(top.ddate);const dl2=dd===null?"":dd<0?` ⚠️${Math.abs(dd)}일 초과`:dd===0?" 🚨오늘 마감":` D-${dd}`;L.push(`\n🎯 오늘의 핵심`);L.push(`  ${top.title}${p?` [${p.name}]`:""}${dl2}`);}
  const di=at.filter(t=>{const dd=calcDday(t.ddate);return dd!==null&&dd<=3;}).sort((a,b)=>calcDday(a.ddate)-calcDday(b.ddate));
  if(di.length){L.push(`\n⚠️ 마감 임박 (${di.length}건)`);di.forEach(t=>{const p=(data.projects||[]).find(x=>x.id===t.projectId);const dd=calcDday(t.ddate);const dl3=dd<0?`${Math.abs(dd)}일 초과 ❗`:dd===0?"오늘 마감 🚨":`D-${dd}`;L.push(`  • [${dl3}] ${t.title}${p?` — ${p.name}`:""}`);})}
  const ar=(data.reagents||[]).filter(r=>{const dd=calcDday(r.eta);return dd!==null&&dd<=3&&r.status==="배송중";});
  if(ar.length){L.push(`\n🧪 시약 도착 임박`);ar.forEach(r=>{const dd=calcDday(r.eta);L.push(`  • ${r.name} — D-${dd} (${r.vendor})`);});}
  const no=(data.reagents||[]).filter(r=>r.status==="주문전"||r.status==="재주문필요");
  if(no.length){L.push(`\n📦 주문 필요 (${no.length}건)`);no.forEach(r=>L.push(`  • ${r.name} [${r.status}]`));}
  const ap=(data.projects||[]).filter(p=>p.status==="진행중");
  if(ap.length){L.push(`\n📁 프로젝트 현황`);ap.forEach(proj=>{const pt=(data.tasks||[]).filter(t=>t.projectId===proj.id);const apt=pt.filter(t=>!t.done&&!t.archived);const dpt=pt.filter(t=>t.done||t.archived);const prog=pt.length?Math.round(dpt.length/pt.length*100):0;const bar="█".repeat(Math.round(prog/10))+"░".repeat(10-Math.round(prog/10));const nxt=apt.sort((a,b)=>{const po={urgent:0,important:1,normal:2};return po[a.priority]-po[b.priority];})[0];L.push(`\n  ${proj.name} ${prog}%`);L.push(`  ${bar}`);if(nxt){const dd=calcDday(nxt.ddate);const dl4=dd===null?"":dd<0?` ⚠️`:dd===0?" 🚨오늘":` D-${dd}`;L.push(`  → ${nxt.title}${dl4}`);}});}
  const tot=at.length,uc=ut.length,dc=(data.tasks||[]).filter(t=>t.done&&!t.archived).length;
  L.push(`\n─────────────────`);
  L.push(`진행 중 ${tot}개${uc>0?`  🔴 급한 일 ${uc}개`:""}${dc>0?`  ✅ 완료 ${dc}개`:""}`);
  return L.join("\n");
}

function callApi(apiKey,prompt){
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-allow-browser":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();});
}

function syncSave(cfg,data){
  return fetch("https://api.jsonbin.io/v3/b/"+cfg.binId,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":cfg.apiKey},
    body:JSON.stringify(Object.assign({},data,{_savedAt:new Date().toISOString(),_savedFrom:"PC"}))
  }).then(function(r){return r.json();});
}

function syncLoad(cfg){
  return fetch("https://api.jsonbin.io/v3/b/"+cfg.binId+"/latest",{
    headers:{"X-Master-Key":cfg.apiKey}
  }).then(function(r){return r.json();});
}

function App(){
  const[data,setData]=useState(load);
  const[view,setView]=useState("dashboard");
  const[bText,setBText]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[selProj,setSelProj]=useState(null);
  const[editProj,setEditProj]=useState(null);
  const[showAddTask,setShowAddTask]=useState(false);
  const[newTask,setNewTask]=useState({title:"",priority:"normal",ddate:"",projectId:"",briefing:false,starred:false});
  const[showAddReagent,setShowAddReagent]=useState(false);
  const[newReagent,setNewReagent]=useState({name:"",vendor:"",ordered:"",eta:"",status:"주문전",memo:""});
  const[editReagent,setEditReagent]=useState(null);
  const[taskFilter,setTaskFilter]=useState("all");
  const[showAddProj,setShowAddProj]=useState(false);
  const[newProj,setNewProj]=useState({name:"",overview:"",goal:"",color:"#818cf8",memo:""});
  const[apiKey,setApiKey]=useState(function(){return localStorage.getItem("myday_apikey")||"";});
  const[showApiInput,setShowApiInput]=useState(false);
  const[syncCfg,setSyncCfg]=useState(loadSS);
  const[showSync,setShowSync]=useState(false);
  const[syncStatus,setSyncStatus]=useState("");
  const[syncLoad2,setSyncLoad2]=useState(false);

  useEffect(function(){try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){}},[data]);
  useEffect(function(){if(nowHour>=8)setBText(buildBriefing(data));},[]);

  const upd=function(fn){setData(function(d){return Object.assign({},fn(d));});};
  const tasks=data.tasks||[];
  const projs=data.projects||[];
  const reagents=data.reagents||[];
  const active=tasks.filter(function(t){return !t.archived;});

  const filtered=taskFilter==="all"?active:taskFilter==="starred"?active.filter(function(t){return t.starred;}):taskFilter==="briefing"?active.filter(function(t){return t.briefing;}):taskFilter==="archived"?tasks.filter(function(t){return t.archived;}):active.filter(function(t){return t.projectId===parseInt(taskFilter);});
  const sorted=[].concat(filtered).sort(function(a,b){const po={urgent:0,important:1,normal:2};if(po[a.priority]!==po[b.priority])return po[a.priority]-po[b.priority];const da=calcDday(a.ddate),db=calcDday(b.ddate);if(da!==null&&db!==null)return da-db;if(da!==null)return-1;if(db!==null)return 1;return 0;});

  function setTF(id,f){upd(function(d){return Object.assign({},d,{tasks:d.tasks.map(function(t){return t.id===id?Object.assign({},t,f):t;})});});}
  function togF(id,f){upd(function(d){const o={};o[f]=true;return Object.assign({},d,{tasks:d.tasks.map(function(t){if(t.id!==id)return t;const n=Object.assign({},t);n[f]=!n[f];return n;})});});}
  function handleDone(id){const t=tasks.find(function(x){return x.id===id;});if(t.done){setTF(id,{done:false});}else{setTF(id,{done:true});}}
  function archTask(id){setTF(id,{done:true,archived:true});}
  function delTask(id){upd(function(d){return Object.assign({},d,{tasks:d.tasks.filter(function(t){return t.id!==id;})});});}
  function restTask(id){setTF(id,{done:false,archived:false});}
  function addTask(){
    if(!newTask.title.trim())return;
    upd(function(d){return Object.assign({},d,{tasks:d.tasks.concat([{id:Date.now(),cat:"work",title:newTask.title,priority:newTask.priority,ddate:newTask.ddate||null,projectId:newTask.projectId?parseInt(newTask.projectId):null,starred:newTask.starred,briefing:newTask.briefing,done:false,archived:false}])});});
    setNewTask({title:"",priority:"normal",ddate:"",projectId:"",briefing:false,starred:false});setShowAddTask(false);
  }

  function calcProg(id){const all=tasks.filter(function(t){return t.projectId===id;});if(!all.length)return 0;return Math.round(all.filter(function(t){return t.done||t.archived;}).length/all.length*100);}
  function addProj(){
    if(!newProj.name.trim())return;
    upd(function(d){return Object.assign({},d,{projects:d.projects.concat([{id:Date.now(),cat:"work",parentId:null,name:newProj.name,status:"진행중",color:newProj.color,overview:newProj.overview,goal:newProj.goal,memo:newProj.memo,starred:false}])});});
    setNewProj({name:"",overview:"",goal:"",color:"#818cf8",memo:""});setShowAddProj(false);
  }
  function saveEditProj(ep){upd(function(d){return Object.assign({},d,{projects:d.projects.map(function(p){return p.id===ep.id?ep:p;})});});setEditProj(null);setSelProj(ep);}
  function togProjStatus(id){upd(function(d){return Object.assign({},d,{projects:d.projects.map(function(p){return p.id===id?Object.assign({},p,{status:p.status==="진행중"?"완료":"진행중"}):p;})});});}
  function togProjStar(id){upd(function(d){return Object.assign({},d,{projects:d.projects.map(function(p){return p.id===id?Object.assign({},p,{starred:!p.starred}):p;})});});}
  function delProj(id){upd(function(d){return Object.assign({},d,{projects:d.projects.filter(function(p){return p.id!==id;}),tasks:d.tasks.map(function(t){return t.projectId===id?Object.assign({},t,{projectId:null}):t;})});});setSelProj(null);}

  function addReagent(){if(!newReagent.name.trim())return;upd(function(d){return Object.assign({},d,{reagents:(d.reagents||[]).concat([Object.assign({id:Date.now()},newReagent)])});});setNewReagent({name:"",vendor:"",ordered:"",eta:"",status:"주문전",memo:""});setShowAddReagent(false);}
  function updReagent(id,f){upd(function(d){return Object.assign({},d,{reagents:d.reagents.map(function(r){return r.id===id?Object.assign({},r,f):r;})});});}
  function delReagent(id){upd(function(d){return Object.assign({},d,{reagents:d.reagents.filter(function(r){return r.id!==id;})});});}

  function genAI(){
    if(!apiKey){setShowApiInput(true);return;}
    setAiLoad(true);
    const bt=tasks.filter(function(t){return t.briefing&&!t.done&&!t.archived;});
    const ut=tasks.filter(function(t){return t.priority==="urgent"&&!t.done&&!t.archived;});
    const combined=[].concat(bt,ut).filter(function(t,i,a){return a.findIndex(function(x){return x.id===t.id;})===i;});
    const list=combined.map(function(t){const p=projs.find(function(x){return x.id===t.projectId;});const dd=calcDday(t.ddate);return"- ["+PRI[t.priority].label+"] "+t.title+(p?" ("+p.name+")":"")+(dd!==null?" D-"+dd:"");}).join("\n");
    const ri=(reagents||[]).filter(function(r){return r.status==="주문전"||r.status==="재주문필요"||r.status==="배송중";}).map(function(r){return"- "+r.name+" ["+r.status+"]"+(r.eta?" ETA:"+r.eta:"");}).join("\n");
    const now=new Date();const dn=["일","월","화","수","목","금","토"];
    const prompt="오늘은 "+(now.getMonth()+1)+"월 "+now.getDate()+"일 ("+dn[now.getDay()]+")입니다. 나는 연구자입니다.\n\n할일:\n"+list+"\n\n시약 현황:\n"+(ri||"없음")+"\n\n개인비서처럼 간결하고 자연스럽게 오늘의 브리핑을 해주세요. 가장 급한 것부터, 시약 도착/주문 사항도 포함해서 알려주세요. 이모지 적절히 사용해주세요.";
    callApi(apiKey,prompt).then(function(j){
      if(j.error){alert("API 오류: "+j.error.message);setBText(buildBriefing(data));}
      else setBText((j.content||[]).map(function(c){return c.text||"";}).join("\n")||"브리핑 생성 실패");
      setAiLoad(false);
    }).catch(function(){setBText(buildBriefing(data));setAiLoad(false);});
  }

  function doSyncSave(){
    if(!syncCfg.apiKey||!syncCfg.binId){setSyncStatus("❌ API 키와 Bin ID를 먼저 입력해주세요.");return;}
    setSyncLoad2(true);setSyncStatus("☁️ 저장 중...");
    syncSave(syncCfg,data).then(function(j){
      if(j.metadata)setSyncStatus("✅ 저장 완료! ("+new Date().toLocaleTimeString("ko-KR")+")");
      else setSyncStatus("❌ 저장 실패");
      setSyncLoad2(false);
    }).catch(function(){setSyncStatus("❌ 네트워크 오류");setSyncLoad2(false);});
  }

  function doSyncLoad(){
    if(!syncCfg.apiKey||!syncCfg.binId){setSyncStatus("❌ API 키와 Bin ID를 먼저 입력해주세요.");return;}
    setSyncLoad2(true);setSyncStatus("☁️ 불러오는 중...");
    syncLoad(syncCfg).then(function(j){
      if(j.record){
        const d=Object.assign({},j.record);
        delete d._savedAt;delete d._savedFrom;
        setData(d);
        setSyncStatus("✅ 불러오기 완료! ("+new Date().toLocaleString("ko-KR")+")");
      }else setSyncStatus("❌ 불러오기 실패");
      setSyncLoad2(false);
    }).catch(function(){setSyncStatus("❌ 네트워크 오류");setSyncLoad2(false);});
  }

  function saveSC(cfg){setSyncCfg(cfg);localStorage.setItem("myday_sync",JSON.stringify(cfg));}

  // Claude JSON 병합
  const[showClaudeImport,setShowClaudeImport]=useState(false);
  const[claudeJson,setClaudeJson]=useState("");
  const[mergeStatus,setMergeStatus]=useState("");

  function mergeClaudeJson(){
    try{
      const parsed=JSON.parse(claudeJson);
      const type=parsed.type;
      if(!type){setMergeStatus("❌ type 필드가 없어요. Claude 프롬프트 형식을 확인해주세요.");return;}

      upd(function(d){
        let nd=Object.assign({},d);

        // 프로젝트 정보 업데이트
        if(parsed.project){
          const pname=parsed.project.name;
          const exists=nd.projects.find(function(p){return p.name===pname;});
          if(exists){
            nd.projects=nd.projects.map(function(p){
              if(p.name!==pname)return p;
              return Object.assign({},p,{
                overview:parsed.project.overview||p.overview,
                goal:parsed.project.goal||p.goal,
                memo:parsed.project.memo||p.memo
              });
            });
          }else{
            nd.projects=nd.projects.concat([{
              id:Date.now(),cat:"work",parentId:null,
              name:pname,status:"진행중",color:"#818cf8",
              overview:parsed.project.overview||"",
              goal:parsed.project.goal||"",
              memo:parsed.project.memo||"",starred:false
            }]);
          }
        }

        // 할일 병합 (중복 제목 제외)
